apiVersion: v1
kind: Namespace
metadata:
  name: kagent
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kagent
  namespace: kagent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubevision-kagent-read
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - events
      - persistentvolumeclaims
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - events.k8s.io
    resources:
      - events
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubevision-kagent-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubevision-kagent-read
subjects:
  - kind: ServiceAccount
    name: kagent
    namespace: kagent
