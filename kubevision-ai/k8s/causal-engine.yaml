apiVersion: v1
kind: Namespace
metadata:
  name: kubevision
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: causal-engine
  namespace: kubevision
  labels:
    app.kubernetes.io/name: causal-engine
    app.kubernetes.io/part-of: kubevision-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: causal-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: causal-engine
        app.kubernetes.io/part-of: kubevision-ai
    spec:
      containers:
        - name: causal-engine
          image: kubevision-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - causal.engine
          env:
            - name: PROMETHEUS_URL
              value: "http://prometheus-service.monitoring.svc.cluster.local:9090"
            - name: DEFAULT_NAMESPACE
              value: "default"
            - name: CAUSAL_WINDOW_MINUTES
              value: "5"
            - name: CAUSAL_INTERVAL_SECONDS
              value: "60"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
