apiVersion: v1
kind: Namespace
metadata:
  name: kubevision
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubevision-backend
  namespace: kubevision
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubevision-backend
  namespace: kubevision
  labels:
    app.kubernetes.io/name: kubevision-backend
    app.kubernetes.io/part-of: kubevision-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubevision-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubevision-backend
        app.kubernetes.io/part-of: kubevision-ai
    spec:
      serviceAccountName: kubevision-backend
      containers:
        - name: backend
          image: kubevision-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: PROMETHEUS_URL
              value: "http://prometheus-service.monitoring.svc.cluster.local:9090"
            - name: DEFAULT_NAMESPACE
              value: "default"
            - name: CAUSAL_WINDOW_MINUTES
              value: "5"
            - name: CAUSAL_INTERVAL_SECONDS
              value: "60"
            - name: CHROMA_PERSIST_DIR
              value: "/data/chromadb"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kubevision-backend
  namespace: kubevision
  labels:
    app.kubernetes.io/name: kubevision-backend
    app.kubernetes.io/part-of: kubevision-ai
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kubevision-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
